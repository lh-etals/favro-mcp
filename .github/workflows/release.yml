name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.7.0-go.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT";
          else echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"; fi

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""; [ "$GOOS" = "windows" ] && ext=".exe"
          out="favro-mcp-${GOOS}-${GOARCH}${ext}"
          go build -trimpath \
            -ldflags="-s -w -X github.com/lh-etals/favro-mcp/internal/mcpserver.Version=${{ steps.ver.outputs.tag }}" \
            -o "dist/$out" .

      - uses: actions/upload-artifact@v4
        with:
          name: favro-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT";
          else echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"; fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: dist/*
          generate_release_notes: true
