name: autorelease

# On every push to main, if the VERSION file names a version that has no matching
# git tag yet, create the tag and build+publish a release for it. This lets a
# contributor ship a release simply by bumping VERSION and merging to main.
#
# Note: the tag is pushed with GITHUB_TOKEN, which does NOT re-trigger the
# release workflow, so we call release.yml directly (reusable) to avoid races.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: maybe tag
    runs-on: ubuntu-latest
    outputs:
      should: ${{ steps.decide.outputs.should }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags/history
      - name: Decide whether to release
        id: decide
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$VERSION" ]; then echo "VERSION file is empty"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "Tag v$VERSION already exists; nothing to release."
            echo "should=false" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$VERSION has no tag v$VERSION yet -> will release."
            echo "should=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push tag
        if: steps.decide.outputs.should == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.decide.outputs.version }}"
          git push origin "v${{ steps.decide.outputs.version }}"

  release:
    name: build & publish
    needs: check
    if: needs.check.outputs.should == 'true'
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.check.outputs.version }}
    permissions:
      contents: write
